<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Zen Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="input-group">
                <input type="text" id="rssUrl" placeholder="输入 RSS 订阅源地址...">
                <button id="previewBtn">查看</button>
            </div>
        </header>

        <main>
            <div id="loading" class="hidden">正在溯源...</div>
            <div id="error" class="hidden"></div>
            
            <div id="feedContent" class="hidden">
                <div id="feedHeader">
                    <img id="feedImage" src="" alt="" class="hidden">
                    <div class="feed-info">
                        <div class="feed-title-wrapper">
                            <h2 id="feedTitle"></h2>
                            <div id="feedCategories"></div>
                        </div>
                        <p id="feedAuthor" class="author"></p>
                        <p id="feedDescription" class="description"></p>
                    </div>
                </div>
                <hr>
                <div id="itemList"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
